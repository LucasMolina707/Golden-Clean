<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Clean | Catálogo Digital</title>

    <!-- CONFIGURACIÓN DE IMÁGENES Y SEO (WhatsApp/Redes) -->
    <!-- Reemplaza las URLs por tus enlaces reales de Google Drive o Hosting -->
    <link rel="icon" href="https://via.placeholder.com/32/0B2046/FFFFFF?text=GC" type="image/x-icon">
    <meta property="og:image" content="https://via.placeholder.com/600x315/0B2046/D4AF37?text=Golden+Clean+Catálogo">
    <meta property="og:title" content="Golden Clean - Productos de Limpieza">
    <meta property="og:description" content="Haz tu pedido por WhatsApp. Soluciones integrales de limpieza para Hogar, Negocios y Revendedores.">
    <meta property="og:type" content="website">

    <style>
        :root {
            --primary: #0B2046; /* Azul Oscuro Golden */
            --gold: #D4AF37;    /* Dorado Golden */
            --white: #FFFFFF;
            --light: #F4F7F9;
            --text: #1A1A1A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--light); color: var(--text); overflow-x: hidden; }

        /* --- ANIMACIÓN DE BURBUJAS --- */
        .foam-bg {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0;
        }
        .bubble {
            position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
            animation: float 8s infinite ease-in;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* --- ONBOARDING --- */
        #onboarding {
            position: fixed; inset: 0; background: var(--primary); display: flex;
            justify-content: center; align-items: center; z-index: 1000; transition: 0.5s;
        }
        .onboarding-card {
            background: var(--white); padding: 2.5rem; border-radius: 20px; width: 90%;
            max-width: 450px; text-align: center; position: relative; z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .logo-placeholder { width: 120px; height: 120px; margin: 0 auto 1.5rem; border-radius: 50%; }
        .onboarding-card h2 { color: var(--primary); margin-bottom: 0.5rem; font-weight: 800; }
        .form-group { margin: 1.5rem 0; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 0.9rem; border: 2px solid #E1E1E1; border-radius: 10px; font-size: 1rem;
        }

        /* --- HEADER & BÚSQUEDA --- */
        header {
            background: var(--primary); color: var(--white); padding: 1rem;
            position: sticky; top: 0; z-index: 100;
        }
        .header-main { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo-text { font-weight: 800; font-size: 1.4rem; color: var(--gold); letter-spacing: 1px; }
        
        .search-container { max-width: 1200px; margin: 1rem auto 0; position: relative; }
        .search-container input {
            width: 100%; padding: 0.8rem 1rem 0.8rem 3rem; border: none; border-radius: 12px;
            background: rgba(255,255,255,0.15); color: var(--white); font-size: 1rem;
        }
        .search-container input::placeholder { color: rgba(255,255,255,0.6); }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); fill: var(--gold); }

        /* --- PRODUCTOS --- */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .categories { display: flex; gap: 0.8rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 2rem; }
        .cat-tag {
            padding: 0.6rem 1.2rem; background: var(--white); border: 2px solid var(--primary);
            color: var(--primary); border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: 600;
        }
        .cat-tag.active { background: var(--primary); color: var(--gold); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card {
            background: var(--white); border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; background: #EEE; }
        .product-body { padding: 1.2rem; display: flex; flex-direction: column; flex-grow: 1; }
        .p-cat { color: var(--gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .p-name { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin: 0.3rem 0; }
        .p-size { font-size: 0.85rem; color: #666; margin-bottom: 0.8rem; }
        .p-price { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 1.2rem; }
        
        /* --- BOTONES --- */
        .btn {
            padding: 0.8rem; border-radius: 10px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none; font-size: 0.9rem;
        }
        .btn-cart { background: var(--gold); color: var(--primary); margin-bottom: 0.5rem; }
        .btn-direct { background: #25D366; color: var(--white); }
        .btn-main { background: var(--primary); color: var(--gold); width: 100%; margin-top: 1rem; font-size: 1.1rem; }

        /* --- CARRITO MODAL --- */
        #cart-panel {
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 450px; height: 100vh;
            background: var(--white); z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #cart-panel.active { right: 0; }
        .cart-header { background: var(--primary); color: var(--gold); padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex-grow: 1; overflow-y: auto; padding: 1.5rem; }
        .cart-item { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid #EEE; padding-bottom: 1rem; }
        .cart-total { padding: 1.5rem; background: var(--light); border-top: 2px solid var(--gold); }
        
        .cart-count-badge {
            background: var(--gold); color: var(--primary); font-size: 0.7rem; font-weight: 800;
            padding: 2px 6px; border-radius: 50%; position: absolute; top: -5px; right: -10px;
        }

        /* --- ICONOS SVG --- */
        .svg-icon { width: 22px; height: 22px; vertical-align: middle; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- ONBOARDING -->
    <div id="onboarding">
        <div class="foam-bg" id="foam-container"></div>
        <div class="onboarding-card">
            <!-- REEMPLAZAR SRC CON TU LOGO -->
            <img src="https://via.placeholder.com/150x150/0B2046/D4AF37?text=LOGO" alt="Golden Clean Logo" class="logo-placeholder">
            <h2>Bienvenido</h2>
            <p>Personaliza tu experiencia de compra</p>
            
            <div class="form-group">
                <label>¿Cómo te llamas o cuál es tu negocio?</label>
                <input type="text" id="input-name" placeholder="Ej: Supermercado El Éxito">
            </div>

            <div class="form-group">
                <label>Selecciona tu perfil de cliente:</label>
                <select id="input-type">
                    <option value="Hogar">Línea Hogar</option>
                    <option value="Negocio">Mi Propio Negocio</option>
                    <option value="Revendedor">Revendedor / Mayorista</option>
                </select>
            </div>

            <button class="btn btn-main" onclick="initApp()">Empezar</button>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="header-main">
            <div class="logo-text">GOLDEN CLEAN</div>
            <div style="position: relative; cursor: pointer;" onclick="toggleCart(true)">
                <svg class="svg-icon" style="fill: var(--gold);" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                <span id="cart-badge" class="cart-count-badge">0</span>
            </div>
        </div>
        <div class="search-container">
            <svg class="svg-icon search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search-input" placeholder="Buscar productos por nombre o características..." onkeyup="handleSearch()">
        </div>
    </header>

    <main class="container">
        <div id="user-welcome" style="margin-bottom: 1.5rem; font-weight: 600; color: var(--primary);"></div>
        
        <div class="categories" id="cat-list">
            <button class="cat-tag active" onclick="filterByCat('Todos', this)">Todos</button>
            <button class="cat-tag" onclick="filterByCat('Lavalozas', this)">Lavalozas</button>
            <button class="cat-tag" onclick="filterByCat('Cuidado Ropa', this)">Cuidado Ropa</button>
            <button class="cat-tag" onclick="filterByCat('Desinfectantes', this)">Desinfectantes</button>
            <button class="cat-tag" onclick="filterByCat('Accesorios', this)">Accesorios</button>
        </div>

        <div class="product-grid" id="grid">
            <!-- Dinámico -->
        </div>
    </main>

    <!-- PANEL CARRITO -->
    <div id="cart-panel">
        <div class="cart-header">
            <h3>Tu Pedido</h3>
            <span style="cursor: pointer;" onclick="toggleCart(false)">Cerrar [X]</span>
        </div>
        <div class="cart-items" id="cart-list"></div>
        <div class="cart-total">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1.2rem; font-weight: 800;">
                <span>Total:</span>
                <span id="cart-total-amount">$0</span>
            </div>
            <button class="btn btn-main" onclick="checkout()">Enviar pedido completo</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "573153544360";
        let userData = JSON.parse(localStorage.getItem('gc_user')) || null;
        let cart = JSON.parse(localStorage.getItem('gc_cart')) || [];
        let currentCat = "Todos";

        // --- PRODUCTOS ---
        const products = [
            { id: 1, name: "Lavaloza Líquido", cat: "Lavalozas", size: "500ml", price: 5500, features: "Antibacterial, aroma limón", img: "https://via.placeholder.com/300x220/EEE/0B2046?text=LAVALOZA+500" },
            { id: 2, name: "Lavaloza Galón", cat: "Lavalozas", size: "4000ml", price: 28000, features: "Arranca grasa industrial", img: "https://via.placeholder.com/300x220/EEE/0B2046?text=LAVALOZA+GALON" },
            { id: 3, name: "Detergente Ropa", cat: "Cuidado Ropa", size: "2000ml", price: 18000, features: "Protección de color", img: "https://via.placeholder.com/300x220/EEE/0B2046?text=DETERGENTE" },
            { id: 4, name: "Desinfectante Pino", cat: "Desinfectantes", size: "1000ml", price: 7500, features: "Elimina 99.9% bacterias", img: "https://via.placeholder.com/300x220/EEE/0B2046?text=DESINFECTANTE" },
            { id: 5, name: "Trapeador Microfibra", cat: "Accesorios", size: "Unidad", price: 12000, features: "Súper absorbente", img: "https://via.placeholder.com/300x220/EEE/0B2046?text=TRAPEADOR" }
        ];

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            createBubbles();
            if(userData) {
                document.getElementById('onboarding').style.display = 'none';
                renderUI();
            }
        };

        // Prevenir cierre
        window.onbeforeunload = (e) => {
            if(cart.length > 0) {
                e.preventDefault();
                return "Tienes productos en el carrito. ¿Seguro que quieres salir?";
            }
        };

        function createBubbles() {
            const container = document.getElementById('foam-container');
            for(let i=0; i<15; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                let size = Math.random() * 60 + 20;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDuration = (Math.random() * 5 + 5) + 's';
                b.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(b);
            }
        }

        function initApp() {
            const name = document.getElementById('input-name').value.trim();
            const type = document.getElementById('input-type').value;
            if(!name) return alert("Por favor, ingresa tu nombre o negocio.");
            
            userData = { name, type };
            localStorage.setItem('gc_user', JSON.stringify(userData));
            document.getElementById('onboarding').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                renderUI();
            }, 500);
        }

        function renderUI() {
            document.getElementById('user-welcome').innerText = `Catálogo para: ${userData.name} (${userData.type})`;
            renderProducts();
            updateCartCount();
        }

        // --- LÓGICA DE PRECIOS ---
        function getPrice(p, qty = 1) {
            let finalPrice = p.price;
            // 1. Si es revendedor, precio especial (ej: -20%)
            if(userData.type === "Revendedor") {
                finalPrice = p.price * 0.80;
            } 
            // 2. Si compra más de 6 unidades (Hogar/Negocio), precio mayorista (ej: -15%)
            else if(qty >= 6) {
                finalPrice = p.price * 0.85;
            }
            return Math.round(finalPrice);
        }

        // --- RENDERIZADO ---
        function renderProducts(search = "") {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            const filtered = products.filter(p => {
                const matchCat = currentCat === "Todos" || p.cat === currentCat;
                const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || 
                                    p.features.toLowerCase().includes(search.toLowerCase());
                return matchCat && matchSearch;
            });

            filtered.forEach(p => {
                const pPrice = getPrice(p);
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-img" alt="${p.name}">
                        <div class="product-body">
                            <span class="p-cat">${p.cat}</span>
                            <h3 class="p-name">${p.name}</h3>
                            <p class="p-size">Tamaño: ${p.size} | ${p.features}</p>
                            <p class="p-price">$${pPrice.toLocaleString('es-CO')}</p>
                            <button class="btn btn-cart" onclick="addToCart(${p.id})">Añadir al Carrito</button>
                            <button class="btn btn-direct" onclick="directOrder(${p.id})">Pedir ahora</button>
                        </div>
                    </div>
                `;
            });
        }

        function handleSearch() {
            renderProducts(document.getElementById('search-input').value);
        }

        function filterByCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderProducts();
        }

        // --- CARRITO ---
        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            const inCart = cart.find(i => i.id === id);
            if(inCart) inCart.qty++;
            else cart.push({...prod, qty: 1});
            
            saveCart();
            updateCartCount();
        }

        function saveCart() {
            localStorage.setItem('gc_cart', JSON.stringify(cart));
        }

        function updateCartCount() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cart-badge').innerText = count;
        }

        function toggleCart(show) {
            const panel = document.getElementById('cart-panel');
            if(show) {
                renderCartList();
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        }

        function renderCartList() {
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            let total = 0;

            cart.forEach(item => {
                const unitPrice = getPrice(item, item.qty);
                const subtotal = unitPrice * item.qty;
                total += subtotal;

                list.innerHTML += `
                    <div class="cart-item">
                        <div style="flex-grow: 1;">
                            <div style="font-weight: 700;">${item.name}</div>
                            <div style="font-size: 0.8rem; color: #666;">Precio: $${unitPrice.toLocaleString('es-CO')} c/u</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button onclick="updateQty(${item.id}, -1)" class="btn" style="padding: 2px 8px; background: #DDD;">-</button>
                            <span>${item.qty}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="btn" style="padding: 2px 8px; background: #DDD;">+</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('cart-total-amount').innerText = `$${total.toLocaleString('es-CO')}`;
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            item.qty += change;
            if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
            saveCart();
            updateCartCount();
            renderCartList();
        }

        // --- WHATSAPP ETIQUETAS ---
        function generateMessage(items, total) {
            let msg = `*NUEVO PEDIDO - GOLDEN CLEAN*\n\n`;
            msg += `_Cliente:_ *${userData.name}*\n`;
            msg += `_Perfil:_ *${userData.type}*\n`;
            msg += `--------------------------------\n`;
            
            items.forEach(i => {
                const price = getPrice(i, i.qty);
                msg += `• *${i.qty}x* ${i.name} (${i.size})\n`;
                msg += `  Subtotal: ~$${(price * i.qty).toLocaleString('es-CO')}~\n`;
            });

            msg += `--------------------------------\n`;
            msg += `*TOTAL ESTIMADO: $${total.toLocaleString('es-CO')}*\n\n`;
            msg += `_Quedo atento a la confirmación de disponibilidad._`;
            return encodeURIComponent(msg);
        }

        function checkout() {
            if(cart.length === 0) return;
            const total = cart.reduce((acc, i) => acc + (getPrice(i, i.qty) * i.qty), 0);
            const msg = generateMessage(cart, total);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
        }

        function directOrder(id) {
            const p = products.find(prod => prod.id === id);
            const total = getPrice(p, 1);
            const msg = generateMessage([{...p, qty: 1}], total);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
        }

    </script>
</body>
</html>
